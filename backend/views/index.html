<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowzy API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000128;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 16px;
            color: #b890ef;
            margin-bottom: 50px;
            line-height: 1.5;
        }
        .button {
            display: block;
            width: 200px;
            padding: 12px;
            margin: 15px auto;
            border-radius: 20px;
            font-size: 16px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            text-align: center;
        }
        .btn-login {
            background-color: #b890ef;
            color: #000000;
            margin-top: 100px; /* Lembra o espaçamento do app */
        }
        .btn-login:hover {
            background-color: #a37be0;
        }
        .btn-cadastro {
            background-color: #000128;
            color: #b890ef;
            border: 2px solid #b890ef;
        }
        .btn-cadastro:hover {
            background-color: rgba(184, 144, 239, 0.1);
        }
        .badge {
            display: inline-block;
            margin-top: 30px;
            font-size: 12px;
            background-color: #1e1f4b;
            padding: 6px 12px;
            border-radius: 12px;
            color: #8a8cb5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo"> Knowzy API</div>
        <p class="subtitle">O back-end do seu projeto está rodando com sucesso no padrão MVC.</p>
    </div>

</body>
</html>
